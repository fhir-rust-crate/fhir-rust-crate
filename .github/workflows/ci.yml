name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      # Every release model, and the R4-only build downstream users may pick.
      - run: cargo build --all-targets --features "r3 r4"
      - run: cargo build --no-default-features --features r4
      - run: cargo build --no-default-features --features r3

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --doc
      # Every release model together: this is what runs the R3 and R4 tests
      # and doctests, since only `r5` is on by default.
      - run: cargo test --features "r3 r4"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features "r3 r4 xml client" -- -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test

  llms:
    name: llms.txt sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bin/check-llms

  features:
    name: Feature builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The `client` feature (reqwest/tokio); HAPI integration tests are #[ignore].
      - run: cargo test --features client
      - run: cargo test --features xml
      - run: cargo build --features precise-decimal
      # The release features are independent: each must stand on its own.
      - run: cargo test --no-default-features --features "r4 xml client" --lib
      - run: cargo test --no-default-features --features "r3 xml client" --lib
      - run: cargo test --features "r3 r4 xml client"

  book:
    name: mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: mdbook build book

  doc:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps
      - run: cargo doc --no-deps --features "r3 r4 xml client"

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The proc-macro crate has no path deps, so its dry-run must be green.
      - run: cargo publish --dry-run -p fhir-derive-macros
      # The parent depends on fhir-derive-macros 1.0.0, which is not yet on
      # crates.io, so its dry-run cannot resolve that version from the registry.
      # Non-blocking until the macro crate 1.0.0 is published (publish it first,
      # then `cargo publish` for fhir).
      - run: cargo publish --dry-run -p fhir
        continue-on-error: true
